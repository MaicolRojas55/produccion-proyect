apiVersion: v1
kind: Service
metadata:
  name: users-mongo
  namespace: coniiti
spec:
  selector:
    app: users-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: users-mongo
  namespace: coniiti
spec:
  serviceName: users-mongo
  replicas: 1
  selector:
    matchLabels:
      app: users-mongo
  template:
    metadata:
      labels:
        app: users-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: users-mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: users-mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
