apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: coniiti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: produccion-proyect/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: RABBITMQ_URL
            - name: EVENTS_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: EVENTS_EXCHANGE
            - name: EVENTS_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: EVENTS_QUEUE
            - name: SQLITE_PATH
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: SQLITE_PATH
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: notifications-data
              mountPath: /data
      volumes:
        - name: notifications-data
          persistentVolumeClaim:
            claimName: notifications-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notifications-data-pvc
  namespace: coniiti
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: coniiti
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: coniiti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /api/notifications/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/notifications/health
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: coniiti
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: coniiti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: produccion-proyect/front-end:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: VITE_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: coniiti
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 5173
      targetPort: 5173
