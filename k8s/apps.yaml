apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: coniiti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: produccion-proyect/users-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: USERS_MONGODB_URI
            - name: MONGODB_DB
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: USERS_MONGODB_DB
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: JWT_ALGORITHM
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: coniiti-secrets
                  key: JWT_SECRET_KEY
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: RABBITMQ_URL
            - name: EVENTS_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: coniiti-config
                  key: EVENTS_EXCHANGE
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: coniiti
spec:
  selector:
    app: users-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
