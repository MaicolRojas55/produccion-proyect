services:

  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    environment:
      # El navegador llama solo a :5173; Vite reenvía /api al gateway (evita CORS y :8080 caído en el cliente).
      - VITE_API_URL=/api
      - API_PROXY_TARGET=http://gateway:80
    depends_on:
      - gateway
    networks:
      - coniiti-net

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - users-service
      - conferences-service
      - notification-service
      - backend
    networks:
      - coniiti-net

  users-service:
    build: ./users-service
    environment:
      - MONGODB_URI=mongodb://users-mongo:27017
      - MONGODB_DB=users_db
      - JWT_SECRET_KEY=super-secret-replace-this
      - JWT_ALGORITHM=HS256
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - EVENTS_EXCHANGE=coniiti.events
    depends_on:
      - users-mongo
      - rabbitmq
    networks:
      - coniiti-net

  conferences-service:
    build: ./conferences-service
    environment:
      - MONGODB_URI=mongodb://conferences-mongo:27017
      - MONGODB_DB=conferences_db
      - JWT_SECRET_KEY=super-secret-replace-this
      - JWT_ALGORITHM=HS256
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - EVENTS_EXCHANGE=coniiti.events
    depends_on:
      - conferences-mongo
      - rabbitmq
    networks:
      - coniiti-net

  backend:
    build: ./back-end
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=produccion_db
      - JWT_SECRET_KEY=super-secret-replace-this
    depends_on:
      - mongo
    networks:
      - coniiti-net

  notification-service:
    build: ./notification-service
    ports:
      - "8002:8002"
    environment:
      - NOTIFICATION_PORT=8002
      - LOG_LEVEL=info
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - EVENTS_EXCHANGE=coniiti.events
      - EVENTS_QUEUE=notifications.q
      - SQLITE_PATH=/data/notifications.sqlite
    volumes:
      - notifications-data:/data
    depends_on:
      - rabbitmq
    networks:
      - coniiti-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - coniiti-net

  users-mongo:
    image: mongo:7
    volumes:
      - users-mongo-data:/data/db
    networks:
      - coniiti-net

  conferences-mongo:
    image: mongo:7
    volumes:
      - conferences-mongo-data:/data/db
    networks:
      - coniiti-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - coniiti-net

volumes:
  mongo-data:
  users-mongo-data:
  conferences-mongo-data:
  notifications-data:

networks:
  coniiti-net:
    driver: bridge
