services:

  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    environment:
      # Debe incluir /api: Nginx en gateway solo enruta ese prefijo al backend.
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - gateway
    networks:
      - coniiti-net

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - users-service
      - conferences-service
      - notification-service
      - backend
    networks:
      - coniiti-net

  users-service:
    build: ./users-service
    environment:
      - MONGODB_URI=mongodb://users-mongo:27017
      - MONGODB_DB=users_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - RABBITMQ_URL=${RABBITMQ_URL}
      - EVENTS_EXCHANGE=coniiti.events
    depends_on:
      - users-mongo
      - rabbitmq
    networks:
      - coniiti-net

  conferences-service:
    build: ./conferences-service
    environment:
      - MONGODB_URI=mongodb://conferences-mongo:27017
      - MONGODB_DB=conferences_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - RABBITMQ_URL=${RABBITMQ_URL}
      - EVENTS_EXCHANGE=coniiti.events
    depends_on:
      - conferences-mongo
      - rabbitmq
    networks:
      - coniiti-net

  backend:
    build: ./back-end
    # Puerto NO expuesto al host — solo accesible via gateway interno
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=produccion_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - mongo
    networks:
      - coniiti-net

  notification-service:
    build: ./notification-service
    # Puerto NO expuesto al host — solo accesible via gateway interno
    environment:
      - NOTIFICATION_PORT=8002
      - LOG_LEVEL=info
      - RABBITMQ_URL=${RABBITMQ_URL}
      - EVENTS_EXCHANGE=coniiti.events
      - EVENTS_QUEUE=notifications.q
      - SQLITE_PATH=/data/notifications.sqlite
    volumes:
      - notifications-data:/data
    depends_on:
      - rabbitmq
    networks:
      - coniiti-net

  rabbitmq:
    image: rabbitmq:3-management
    # Puerto 5672 y consola 15672 NO expuestos al host en producción
    # Para debug local descomenta las líneas de ports:
    # ports:
    #   - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-coniiti_mq}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-changeme}
    networks:
      - coniiti-net

  users-mongo:
    image: mongo:7
    volumes:
      - users-mongo-data:/data/db
    networks:
      - coniiti-net

  conferences-mongo:
    image: mongo:7
    volumes:
      - conferences-mongo-data:/data/db
    networks:
      - coniiti-net

  mongo:
    image: mongo:7
    # Puerto 27017 NO expuesto al host — solo accesible dentro de coniiti-net
    volumes:
      - mongo-data:/data/db
    networks:
      - coniiti-net

volumes:
  mongo-data:
  users-mongo-data:
  conferences-mongo-data:
  notifications-data:

networks:
  coniiti-net:
    driver: bridge
