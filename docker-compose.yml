version: '3.9'

services:

  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    environment:
      # Debe incluir /api: Nginx en gateway solo enruta ese prefijo al backend.
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - gateway
    networks:
      - coniiti-net

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - coniiti-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000
      - LOG_LEVEL=info
      # Mismo secreto que JWT_SECRET_KEY del backend para validar tokens emitidos por la API.
      - JWT_SECRET=super-secret-replace-this
      - JWT_ALGORITHM=HS256
      - BACKEND_TIMEOUT=30
      - GATEWAY_VERSION=0.2.0
      - RATE_LIMIT_PER_MINUTE=100
    depends_on:
      - backend
    networks:
      - coniiti-net

  backend:
    build: ./back-end
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=produccion_db
      - JWT_SECRET_KEY=super-secret-replace-this
    depends_on:
      - mongo
    networks:
      - coniiti-net

  notification-service:
    build: ./notification-service
    ports:
      - "8002:8002"
    environment:
      - NOTIFICATION_PORT=8002
      - LOG_LEVEL=info
    networks:
      - coniiti-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - coniiti-net

volumes:
  mongo-data:

networks:
  coniiti-net:
    driver: bridge
