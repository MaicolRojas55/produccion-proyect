name: CI Pipeline

on:
  push:
    branches:
      - desarrollo-rediseño
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci
        working-directory: front-end

      - name: Ejecutar ESLint (falla si hay errores)
        run: npm run lint
        working-directory: front-end

  test:
    name: 🧪 Pruebas Unitarias
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci
        working-directory: front-end

      - name: Ejecutar pruebas con Vitest
        run: npm run test
        working-directory: front-end

  build:
    name: 🏗️ Build Estricto
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci
        working-directory: front-end

      - name: Build de producción (falla con warnings)
        run: npm run build
        env:
          CI: true
        working-directory: front-end
        env:
          CI: true
